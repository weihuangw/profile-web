<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>HUANG WEI - Links</title>
    <script>
        document.documentElement.style.backgroundColor = 'oklch(0.12 0 0)';
        document.documentElement.style.colorScheme = 'dark';
    </script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        html {
            height: 100%;
            overflow: hidden;
            scrollbar-gutter: auto;
        }

        body {
            height: 100%;
            min-height: unset;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        main {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .links-wrap {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .links-name {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: oklch(0.76 0 340);
            text-transform: uppercase;
            line-height: 1;
            margin: 0 0 44px;
            text-align: center;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 24px 24px;
            border: 1px solid rgba(255,255,255,0.15);
            background-color: rgba(255,255,255,0.02);
            text-decoration: none;
            color: oklch(0.96 0 340);
            transition: border-color 0.25s ease, background-color 0.25s ease;
            text-align: center;
            margin-bottom: 20px;
        }

        @media (hover: hover) {
            .link-item:hover {
                border-color: rgba(255,255,255,0.5);
                background-color: rgba(255,255,255,0.04);
            }
        }

        .link-item-title {
            font-size: clamp(14px, 1vw, 18px);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: inherit;
        }
    </style>
</head>

<body class="no-transition">
    <script>
        window.addEventListener('load', function () {
            requestAnimationFrame(function () {
                document.body.classList.remove('no-transition');
            });
        });
    </script>

    <main class="page-ready">
        <div class="links-wrap">
            <p class="links-name">Huang Wei 黃偉</p>
            <a href="works" class="link-item">
                <span class="link-item-title">Website</span>
            </a>

            <a href="https://www.instagram.com/weihuang_" target="_blank" class="link-item">
                <span class="link-item-title">Instagram</span>
            </a>

            <a href="https://www.youtube.com/@w.weihuang.h" target="_blank" class="link-item">
                <span class="link-item-title">Youtube</span>
            </a>

            <a href="mailto:info@weihuang.io" class="link-item">
                <span class="link-item-title">Contact</span>
            </a>
        </div>
    </main>

<script src="js/script.js"></script>
</body>

</html>
