<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/about/point.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>HUANG WEI — Links</title>
    <script>
        document.documentElement.style.backgroundColor = 'oklch(0.12 0 0)';
    </script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            padding-bottom: 10vh;
        }

        .links-wrap {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .links-name {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: oklch(0.76 0 340);
            text-transform: uppercase;
            
        }

        .links-desc {
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 24px;
            text-align: center;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 15px 80px;
            border: 2px solid rgba(255,255,255,0.4);
            text-decoration: none;
            color: #e0e0e0;
            transition: border-color 0.25s ease, background-color 0.25s ease;
            text-align: center;
            gap: 2px;
        }

        @media (hover: hover) {
            .link-item:hover {
                border-color: rgba(255,255,255,0.5);
                background-color: rgba(255,255,255,0.04);
            }
        }

        .link-item-title {
            font-size: clamp(12px, 1vw, 16px);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: oklch(0.96 0 340);
        }

        .link-item-type {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #666;
        }

        .links-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.12);
            margin: 4px 0;
        }

        .link-item.link-primary {
            border-color: rgba(255,255,255,0.4);
        }

    </style>
</head>

<body class="no-transition">
    <script>
        window.addEventListener('load', function () {
            requestAnimationFrame(function () {
                document.body.classList.remove('no-transition');
            });
        });
    </script>

    <main class="page-ready">
        <div class="links-wrap">
            <p class="links-name">HUANG WEI</p>

            <a href="works.html" class="link-item">
                <span class="link-item-title">Website</span>
            </a>

            <a href="https://www.instagram.com/weihuang_" target="_blank" class="link-item">
                <span class="link-item-title">Instagram</span>
            </a>

            <a href="https://www.youtube.com/@w.weihuang.h" target="_blank" class="link-item">
                <span class="link-item-title">Videos</span>
            </a>

            <a href="mailto:info@weihuang.io" class="link-item">
                <span class="link-item-title">Contact</span>
            </a>
        </div>
    </main>

<script src="js/script.js"></script>
</body>

</html>
